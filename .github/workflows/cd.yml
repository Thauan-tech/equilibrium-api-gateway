name: CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI }}
  EC2_HOST: ${{ secrets.EC2_HOST }}

jobs:
  # ─── Gate: testes precisam passar antes de deployar ────────────────────────
  test:
    name: Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: equilibrium-payment-gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: equilibrium-payment-gateway/requirements.txt

      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  # ─── Build e push da imagem para ECR ───────────────────────────────────────
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push
        working-directory: equilibrium-payment-gateway
        run: |
          IMAGE="${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }}"
          docker build --target final -t "$IMAGE" .
          docker push "$IMAGE"
          docker tag "$IMAGE" "${{ env.ECR_REPOSITORY_URI }}:latest"
          docker push "${{ env.ECR_REPOSITORY_URI }}:latest"

  # ─── Deploy na EC2 via SSH ─────────────────────────────────────────────────
  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS (para gerar token ECR na EC2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Autenticar no ECR usando a IAM role da instância
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REPOSITORY_URI }}

            # Copiar docker-compose para EC2 (se não existir)
            mkdir -p /opt/app

            # Pull da nova imagem
            docker pull ${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }}

            # Escrever docker-compose de produção
            cat > /opt/app/docker-compose.yml <<'COMPOSE'
            services:
              api:
                image: ${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }}
                container_name: equilibrium-api
                ports:
                  - "8000:8000"
                env_file:
                  - /opt/app/.env
                environment:
                  - DATABASE_URL=postgresql+asyncpg://equilibrium_user:${DB_PASSWORD}@postgres:5432/equilibrium_payments
                  - REDIS_URL=redis://redis:6379
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
                restart: unless-stopped
                networks:
                  - equilibrium-network

              postgres:
                image: postgres:16-alpine
                container_name: equilibrium-postgres
                environment:
                  - POSTGRES_USER=equilibrium_user
                  - POSTGRES_PASSWORD=${DB_PASSWORD}
                  - POSTGRES_DB=equilibrium_payments
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U equilibrium_user -d equilibrium_payments"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped
                networks:
                  - equilibrium-network

              redis:
                image: redis:7-alpine
                container_name: equilibrium-redis
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 3s
                  retries: 5
                restart: unless-stopped
                networks:
                  - equilibrium-network

            volumes:
              postgres_data:
              redis_data:

            networks:
              equilibrium-network:
                driver: bridge
            COMPOSE

            # Subir serviços de suporte (postgres + redis)
            docker compose -f /opt/app/docker-compose.yml up -d postgres redis

            # Aguardar postgres ficar saudável
            sleep 10

            # Rodar migrations
            docker run --rm \
              --network equilibrium-network \
              --env-file /opt/app/.env \
              -e DATABASE_URL="postgresql+asyncpg://equilibrium_user:${DB_PASSWORD}@postgres:5432/equilibrium_payments" \
              ${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }} \
              alembic upgrade head

            # Subir/reiniciar a API
            docker compose -f /opt/app/docker-compose.yml up -d api

            # Remover imagens antigas
            docker image prune -f

            echo "Deploy concluido: ${{ github.sha }}"

      - name: Verificar saúde da API
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            "http://${{ env.EC2_HOST }}:8000/health"

      - name: Resumo
        run: |
          echo "### Deploy concluido" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Host:** \`${{ env.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** http://${{ env.EC2_HOST }}:8000" >> $GITHUB_STEP_SUMMARY
