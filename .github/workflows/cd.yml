name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push
        working-directory: equilibrium-payment-gateway
        run: |
          IMAGE="${{ secrets.ECR_REPOSITORY_URI }}:${{ github.sha }}"
          docker build --target final -t "$IMAGE" .
          docker push "$IMAGE"
          docker tag "$IMAGE" "${{ secrets.ECR_REPOSITORY_URI }}:latest"
          docker push "${{ secrets.ECR_REPOSITORY_URI }}:latest"

  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: ECR_REPOSITORY_URI,GITHUB_SHA,AWS_REGION
          script: |
            set -e

            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REPOSITORY_URI

            mkdir -p /opt/app

            docker pull $ECR_REPOSITORY_URI:$GITHUB_SHA

            cat > /opt/app/docker-compose.yml <<EOF
            services:
              api:
                image: $ECR_REPOSITORY_URI:$GITHUB_SHA
                container_name: equilibrium-api
                ports:
                  - "8000:8000"
                env_file:
                  - /opt/app/.env
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
                restart: unless-stopped
                networks:
                  - equilibrium-network

              postgres:
                image: postgres:16-alpine
                container_name: equilibrium-postgres
                env_file:
                  - /opt/app/.env
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U equilibrium_user -d equilibrium_payments"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped
                networks:
                  - equilibrium-network

              redis:
                image: redis:7-alpine
                container_name: equilibrium-redis
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 3s
                  retries: 5
                restart: unless-stopped
                networks:
                  - equilibrium-network

            volumes:
              postgres_data:
              redis_data:

            networks:
              equilibrium-network:
                driver: bridge
            EOF

            docker compose -f /opt/app/docker-compose.yml up -d postgres redis
            sleep 10

            docker run --rm \
              --network equilibrium-network \
              --env-file /opt/app/.env \
              $ECR_REPOSITORY_URI:$GITHUB_SHA \
              alembic upgrade head

            docker compose -f /opt/app/docker-compose.yml up -d api
            docker image prune -f

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            "http://${{ secrets.EC2_HOST }}:8000/health"

      - name: Resumo
        run: |
          echo "### Deploy concluido" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** http://${{ secrets.EC2_HOST }}:8000" >> $GITHUB_STEP_SUMMARY
