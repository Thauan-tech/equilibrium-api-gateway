name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    outputs:
      ecr_repository_uri: ${{ steps.image-meta.outputs.ecr_repository_uri }}
      image_tag: ${{ steps.image-meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate AWS region
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.AWS_REGION }}" ]; then
            echo "::error::Secret AWS_REGION está vazio."
            exit 1
          fi

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image metadata
        id: image-meta
        env:
          ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME }}
        run: |
          set -euo pipefail

          REPOSITORY_NAME="$ECR_REPOSITORY_NAME"
          if [ -z "$REPOSITORY_NAME" ]; then
            REPOSITORY_NAME="equilibrium-api"
          fi

          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          if [ -z "$REGISTRY" ]; then
            echo "::error::Nao foi possivel resolver o registry ECR."
            exit 1
          fi

          ECR_REPOSITORY_URI="$REGISTRY/$REPOSITORY_NAME"
          IMAGE_TAG="${GITHUB_SHA}"

          echo "ecr_repository_uri=$ECR_REPOSITORY_URI" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build e push
        working-directory: equilibrium-payment-gateway
        env:
          ECR_REPOSITORY_URI: ${{ steps.image-meta.outputs.ecr_repository_uri }}
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE="$ECR_REPOSITORY_URI:$IMAGE_TAG"
          docker build --target final -t "$IMAGE" .
          docker push "$IMAGE"
          docker tag "$IMAGE" "$ECR_REPOSITORY_URI:latest"
          docker push "$ECR_REPOSITORY_URI:latest"

  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      ECR_REPOSITORY_URI: ${{ needs.build-and-push.outputs.ecr_repository_uri }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate deploy inputs
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          if [ -z "$ECR_REPOSITORY_URI" ]; then
            echo "::error::ECR_REPOSITORY_URI nao foi resolvido no job de build."
            exit 1
          fi
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::IMAGE_TAG nao foi resolvido no job de build."
            exit 1
          fi
          if [ -z "$EC2_HOST" ]; then
            echo "::error::Secret EC2_HOST está vazio."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ECR_REPOSITORY_URI: ${{ env.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: ECR_REPOSITORY_URI,IMAGE_TAG,AWS_REGION
          script: |
            set -euo pipefail

            ECR_REGISTRY="${ECR_REPOSITORY_URI%%/*}"

            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            mkdir -p /opt/app

            docker pull $ECR_REPOSITORY_URI:$IMAGE_TAG

            cat > /opt/app/docker-compose.yml <<EOF_REMOTE
            services:
              api:
                image: $ECR_REPOSITORY_URI:$IMAGE_TAG
                container_name: equilibrium-api
                ports:
                  - "8000:8000"
                env_file:
                  - /opt/app/.env
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
                restart: unless-stopped
                networks:
                  - equilibrium-network

              postgres:
                image: postgres:16-alpine
                container_name: equilibrium-postgres
                env_file:
                  - /opt/app/.env
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U equilibrium_user -d equilibrium_payments"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped
                networks:
                  - equilibrium-network

              redis:
                image: redis:7-alpine
                container_name: equilibrium-redis
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 3s
                  retries: 5
                restart: unless-stopped
                networks:
                  - equilibrium-network

            volumes:
              postgres_data:
              redis_data:

            networks:
              equilibrium-network:
                name: equilibrium-network
                driver: bridge
            EOF_REMOTE

            docker compose -f /opt/app/docker-compose.yml up -d postgres redis
            sleep 10

            docker run --rm \
              --network equilibrium-network \
              --env-file /opt/app/.env \
              $ECR_REPOSITORY_URI:$IMAGE_TAG \
              alembic upgrade head

            docker compose -f /opt/app/docker-compose.yml up -d api
            docker image prune -f

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            "http://${{ secrets.EC2_HOST }}:8000/health"

      - name: Resumo
        run: |
          echo "### Deploy concluido" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** http://${{ secrets.EC2_HOST }}:8000" >> $GITHUB_STEP_SUMMARY
