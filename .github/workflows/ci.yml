name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: equilibrium-payment-gateway

    env:
      # Valores dummy para evitar erros de validação do Pydantic durante os testes
      SECRET_KEY: "ci-secret-key-for-testing-only"
      DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/test"
      REDIS_URL: "redis://localhost:6379"
      ADMIN_SETUP_KEY: "ci-setup-key"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: equilibrium-payment-gateway/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: equilibrium-payment-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: equilibrium-payment-gateway/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar lint
        run: ruff check .

      - name: Verificar formatação
        run: ruff format --check .

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Terraform validate
        working-directory: infra/terraform
        run: |
          terraform init -backend=false
          terraform validate
