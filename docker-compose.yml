services:
  api:
    build:
      context: ./equilibrium-payment-gateway
      target: final
    container_name: equilibrium-api
    ports:
      - "8000:8000"
    env_file:
      - ./equilibrium-payment-gateway/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://equilibrium_user:equilibrium_pass@postgres:5432/equilibrium_payments
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./equilibrium-payment-gateway/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - equilibrium-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: equilibrium-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=equilibrium_user
      - POSTGRES_PASSWORD=equilibrium_pass
      - POSTGRES_DB=equilibrium_payments
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equilibrium_user -d equilibrium_payments"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - equilibrium-network

  redis:
    image: redis:7-alpine
    container_name: equilibrium-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - equilibrium-network

volumes:
  postgres_data:
  redis_data:

networks:
  equilibrium-network:
    driver: bridge
