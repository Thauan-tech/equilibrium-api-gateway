services:
  api:
    build:
      target: final
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --proxy-headers
      --forwarded-allow-ips='*'
    volumes: []  # sem bind mount em prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    ports: []
